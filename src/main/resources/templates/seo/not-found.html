<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Not Found - xLearning</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #333; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; text-align: center; flex: 1; display: flex; flex-direction: column; justify-content: center; }
        h1 { font-size: 72px; color: #4f46e5; margin-bottom: 16px; }
        h2 { font-size: 24px; color: #1a1a2e; margin-bottom: 12px; }
        p { color: #666; margin-bottom: 24px; }
        .btn { display: inline-block; background: #4f46e5; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: 600; }
        .btn:hover { background: #4338ca; }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Video Not Found</h2>
        <p>The video you're looking for doesn't exist or has been removed.</p>
        <a href="/video" class="btn">Browse All Videos</a>
    </div>
</body>
</html>
